name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WxClone ${{ github.ref_name }}"
          releaseBody: "自动构建的 macOS 安装包。"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: --target universal-apple-darwin --ci -v --bundles app

      - name: Create DMG package
        shell: bash
        run: |
          set -euo pipefail

          app_path="src-tauri/target/universal-apple-darwin/release/bundle/macos/WxClone.app"
          dmg_dir="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          dmg_path="${dmg_dir}/WxClone_${GITHUB_REF_NAME#v}_universal.dmg"
          staging_dir="${RUNNER_TEMP}/wxclone-dmg"

          test -d "$app_path"
          rm -rf "$staging_dir" "$dmg_path"
          mkdir -p "$staging_dir" "$dmg_dir"

          ditto "$app_path" "$staging_dir/WxClone.app"
          ln -s /Applications "$staging_dir/Applications"

          hdiutil detach "/Volumes/WxClone" -force || true
          for attempt in 1 2 3; do
            echo "Creating DMG, attempt ${attempt}"
            if hdiutil create -volname "WxClone" -srcfolder "$staging_dir" -ov -format UDZO "$dmg_path"; then
              echo "DMG_PATH=$dmg_path" >> "$GITHUB_ENV"
              exit 0
            fi
            hdiutil detach "/Volumes/WxClone" -force || true
            hdiutil info || true
            sleep $((attempt * 5))
          done

          echo "Failed to create DMG after retries" >&2
          exit 1

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "$DMG_PATH" --clobber
